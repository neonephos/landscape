# Landscape2 data
#
# This file contains the data that will be used to generate the landscape.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/data.yml

categories:
  - name: Federation
    subcategories:
      - name: Federation
        items:
          - name: Platform Mesh
            description: |
              The Platform Mesh is the main Platform API for users and technical services to order and orchestrate capabilities attached to the environment.
              
              Its guiding and design principle is inherited from Kubernetes’s declarative API approach with its digital twin manifests, the Kubernetes Resource Model (KRM). It utilizes and refines the upstream project KCP for its purpose.

            homepage_url: https://platform-mesh.io/
            logo: platform_mesh_stacked_color.svg
            
            repo_url: https://github.com/platform-mesh/helm-charts
            summary_integration: "Open Micro Frontend Platform, Gardener"
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              
          - name: Katalis
            description: |
              Katalis should enable a cloud edge continuum in both directions:

              The consumption of telco operator compute/storage resources from gardener controlled environments, i.E. to deploy application fragments close the edge of a UE to fulfill latency requirements
              The extension of telco operator federation to software cloud providers resources
            logo: katalis_icon_color.svg
            
            homepage_url: https://github.com/neonephos-katalis
            repo_url: https://github.com/neonephos-katalis
            summary_integration: "Open Micro Frontend Platform, Gardener"
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              

  - name: Management
    subcategories:
      - name: Management
        items:
          - name: Open Component Model
            description: |
              The Open Component Model (OCM) is an open standard + reference implementation for describing software artifacts in a uniform and machine-readable way. OCM enables consistent end-to-end lifecycle management processes and a secure software supply chain.


            homepage_url: https://ocm.software/
            logo: ocm_horizontal_color.svg
            
            second_path:
              - "Sustainability Domain / Application Layer"
            repo_url: https://github.com/open-component-model/
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              
          - name: Greenhouse
            description: Greenhouse is a Kubernetes based day 2 operations platform focusing on providing a set of opinionated tools & operational processes for managing cloud native infrastructure.
            homepage_url: https://cloudoperators.github.io/greenhouse/
            logo: greenhouse_icon_color.svg
            
            repo_url: https://github.com/cloudoperators/greenhouse
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              

