# Landscape2 data
#
# This file contains the data that will be used to generate the landscape.
#
# Reference documentation: https://github.com/cncf/landscape2/blob/main/docs/config/data.yml

categories:
  - name: Federation
    subcategories:
      - name: Federation
        items:
          - name: Platform Mesh
            description: |
              The Platform Mesh is the main Platform API for users and technical services to order and orchestrate capabilities attached to the environment.
              
              Its guiding and design principle is inherited from Kubernetes’s declarative API approach with its digital twin manifests, the Kubernetes Resource Model (KRM). It utilizes and refines the upstream project KCP for its purpose.

            homepage_url: https://platform-mesh.io/
            logo: platform_mesh_stacked_color.svg
            
            repo_url: https://github.com/platform-mesh/helm-charts
            summary_integration: "Open Micro Frontend Platform, Gardener"
            crunchbase: https://www.crunchbase.com/organization/neonephos

            
              

  - name: Security and Compliance
    subcategories:
      - name: Security and Compliance
        items:
          - name: OpenBAO
            description: |
              OpenBao is an identity-based secrets and encryption management system. A secret is anything that you want to tightly control access to, such as API encryption keys, passwords, and certificates. OpenBao provides encryption services that are gated by authentication and authorization methods. Using OpenBao’s UI, CLI, or HTTP API, access to secrets and other sensitive data can be securely stored and managed, tightly controlled (restricted), and auditable.
            homepage_url: https://openbao.org/
            logo: openbao-vertical-text-color.svg
            repo_url: https://github.com/platform-mesh/helm-charts
          - name: Open Crypto Broker
            description: |
              The Open Crypto Broker allows to move cryptographic operations into a managed environments. This allows to enforce governance and policies as to which algorithms are allowed or not.
            homepage_url: https://github.com/orgs/open-crypto-broker
            logo: open-crypto-broker-logo.svg
            repo_url: https://github.com/orgs/open-crypto-broker/documentation
          - name: Open Key Chain Manager
            description: |
              OpenKCM serves as a central management layer for encryption of data at-rest. It comes with built-in multi-tenancy support and allows each tenant to stay in control of designing keychains and managing their lifecycle.
            homepage_url: https://github.com/openkcm
            logo: open-key-chain-manager-logo.svg
            repo_url: https://github.com/openkcm/orbital


  - name: Management
    subcategories:
      - name: Management
        items:
          - name: Open Component Model
            description: |
              The Open Component Model (OCM) is an open standard + reference implementation for describing software artifacts in a uniform and machine-readable way. OCM enables consistent end-to-end lifecycle management processes and a secure software supply chain.


            homepage_url: https://ocm.software/
            logo: ocm_horizontal_color.svg
            
            second_path:
              - "Sustainability Domain / Application Layer"
            repo_url: https://github.com/open-component-model/
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              
          - name: Greenhouse
            description: Greenhouse is a Kubernetes based day 2 operations platform focusing on providing a set of opinionated tools & operational processes for managing cloud native infrastructure.
            homepage_url: https://cloudoperators.github.io/greenhouse/
            logo: greenhouse_icon_color.svg
            
            repo_url: https://github.com/cloudoperators/greenhouse
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              

  - name: Application
    subcategories:
      - name: Application
        items:
          - name: Open Micro Frontend Platform
            description: |
              The Open Micro Frontend Platform (OpenMFP) aims to provide the opinionated, “batteries-included” platform for building portals and complex web-based applications with enterprise qualities.
            homepage_url: https://openmfp.org/
            logo: openmfp_icon_color.svg
            
            repo_url: https://github.com/openmfp
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              
          - name: Luigi
            description: Luigi is a micro frontend framework that enables you to create a unified user experience across a large set of functionality.
            homepage_url: https://github.com/luigi-project/
            logo: luigi_icon_color.svg
            
            repo_url: https://github.com/luigi-project/luigi
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              
          - name: Konfidence
            description: Konfidence is an open-source software delivery framework. It ensures that only tested and approved versions reach production, addressing a common challenge in complex IT landscapes.
            homepage_url: https://github.com/konfidence-project
            logo: konfidence-project-logo.svg
            repo_url: https://github.com/konfidence-project


  - name: Data
    subcategories:
      - name: Data
        items:
          - name: Open Resource Discovery
            description: |
              ORD is an open protocol for the decentralized publishing and discovery of application and service metadata. It provides a structured schema for metadata such as endpoints, capabilities, documentation links, and ownership details, ensuring that application resources like APIs, events, data products and AI agents can be discovered, understood, and integrated consistently across different systems and marketplaces.

            homepage_url: https://open-resource-discovery.github.io/specification/
            logo: ord_icon_color.svg
            
            repo_url: https://github.com/open-resource-discovery
            crunchbase: https://www.crunchbase.com/organization/neonephos
            specification: true
            
              
          - name: United Metadata Service
            description: |
              The Unified Metadata Service (UMS) is a centralized platform designed to consolidate fragmented metadata, such as APIs, events, services, and tenant information across complex landscapes into a unified, extensible, and model-driven environment. UMS provides a unified metadata layer that enables marketplaces to offer consistent, searchable service catalogs and allows AI systems to interpret, discover, and orchestrate APIs, events and data products automatically.
            homepage_url: https://apeirora.eu
            logo: united-metadata-service-logo.svg

  - name: Service Orchestration
    subcategories:
      - name: Service Orchestration
        items:
          - name: Open Managed Control Plane
            description: |
              OpenMCP is a managed Infrastructure-as-data orchestration layer, designed to streamline and automate the management of cloud resources and corresponding services.
              It involves the coordination and management of various Infrastructure-as-data services, to support the automation of workflows such as provisioning and scaling of workloads.

            homepage_url: https://github.com/openmcp-project
            logo: openmcp_icon_color.svg
            
            repo_url: https://github.com/openmcp-project
            crunchbase: https://www.crunchbase.com/organization/neonephos
            
              

