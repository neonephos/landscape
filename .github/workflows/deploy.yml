name: Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Prepare build directory
        run: |
          mkdir -p build
          chmod -R 777 build

      - name: Build Landscape2 site
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ghcr.io/cncf/landscape2:latest \
            landscape2 build \
              --data-file /workspace/data.yml \
              --settings-file /workspace/settings.yml \
              --guide-file /workspace/guide.yml \
              --games-file /workspace/games.yml \
              --logos-path /workspace/logos \
              --output-dir build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
