name: Deploy Landscape2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Deploy Landscape2
        run: |
          npx landscape2 \
            --logos logos \
            --data data.yml \
            --games games.yml \
            --guide guide.yml \
            --settings settings.yml \
            --deploy
