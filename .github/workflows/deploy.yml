name: Deploy Landscape2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Landscape2 CLI
        run: npm install -g landscape2

      - name: Deploy Landscape2
        run: |
          landscape2 \
            --logos logos \
            --data data.yml \
            --games games.yml \
            --guide guide.yml \
            --settings settings.yml \
            --deploy
