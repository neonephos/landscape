name: Deploy Landscape2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy with Landscape2 Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ghcr.io/cncf/landscape2:latest \
            bash -c "node index.js \
              --logos logos \
              --data data.yml \
              --games games.yml \
              --guide guide.yml \
              --settings settings.yml \
              --deploy"


